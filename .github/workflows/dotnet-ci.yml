name: Docker Build, Push and Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io    
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./MyFirstCI.Api/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release  
    needs: build-and-push 
    runs-on: ubuntu-latest 
    permissions:    
      contents: write # Обязательно необходимо для создания релиза
    steps:  
      - name: Checkout code    
        uses: actions/checkout@v4    
        with:      
          fetch-depth: 0  # Полная история для автоинкремента версии
      
      - name: Build application for release  
        run: |    
            dotnet restore    
            dotnet publish MyFirstCI.Api/MyFirstCI.Api.csproj -c Release -o ./publish-release --self-contained false -p:PublishSingleFile=false

      - name: Create release archive  
        run: | 
          tar -czf my-app-release.tar.gz -C ./publish-release . 
          zip -r my-app-release.zip ./publish-release/*

      - name: Generate release notes from tag  
        id: release_notes  
        run: | 
             # Выполняем проверку на релиз и пререлиз (есть ли суффиксы)
             TAG_NAME="${{ github.ref_name }}"
             if [[ "$TAG_NAME" == *"-beta"* || "$TAG_NAME" == *"-rc"* ]]; then
               echo "is_prerelease=true" >> $GITHUB_OUTPUT
             else
               echo "is_prerelease=false" >> $GITHUB_OUTPUT
             fi

             # Извлекаем сообщение коммита тега   
             TAG_NAME="${GITHUB_REF##*/}"    
             RELEASE_NOTES=$(git tag -l --format='%(contents)' "$TAG_NAME")    
             
             # Если нет сообщения, используем стандартное    
             if [ -z "$RELEASE_NOTES" ]; then     
               RELEASE_NOTES="Release $TAG_NAME"    
             fi    
             
             # Сохраняем в output    
             echo "notes<<EOF" >> $GITHUB_OUTPUT   
             echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT    
             echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release  
        id: create_release  
        uses: softprops/action-gh-release@v1  
        with:
          name: Release ${{ github.ref_name }}    
          body: ${{ steps.release_notes.outputs.notes }}    
          draft: false   
          prerelease: ${{ steps.prerelease_check.outputs.is_prerelease }}   
          files: |     
            my-app-release.tar.gz      
            my-app-release.zip    
          tag_name: ${{ github.ref_name }}

